<!DOCTYPE html>
<html>
<head>
  <title>Mini juego</title>
  <style>
    #jugador {
      width: 50px;
      height: 50px;
      background: red;
      position: absolute;
      top: 100px;
      left: 100px;
    }
  </style>
</head>
<body>
  <div id="jugador"></div>

  <script>
    let jugador = document.getElementById("jugador");
    let x = 100;
    let y = 100;

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowUp") y -= 10;
      if (event.key === "ArrowDown") y += 10;
      if (event.key === "ArrowLeft") x -= 10;
      if (event.key === "ArrowRight") x += 10;

      jugador.style.left = x + "px";
      jugador.style.top = y + "px";
    });
  </script>
</body>
</html>
