<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Canvas Partículas</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle, #0f172a, #020617);
      font-family: Arial, sans-serif;
    }

    #info {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

<div id="info">Mueve el ratón 😎 | Click = explosión</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let particles = [];
let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

window.addEventListener("click", () => {
  for (let i = 0; i < 60; i++) {
    createParticle(mouse.x, mouse.y, true);
  }
});

function createParticle(x, y, explosion = false) {
  const angle = Math.random() * Math.PI * 2;
  const speed = explosion ? Math.random() * 6 : Math.random() * 2;

  particles.push({
    x: x,
    y: y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 100,
    size: Math.random() * 3 + 1
  });
}

function animate() {
  ctx.fillStyle = "rgba(2,6,23,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  createParticle(mouse.x, mouse.y);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    p.x += p.vx;
    p.y += p.vy;
    p.life--;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsl(${p.life * 3}, 100%, 60%)`;
    ctx.fill();

    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
