    <script>
        function validarDNI(value) {
            let valores=['T', 'R', 'W', 'A', 'G', 'M', 'Y', 'F', 'P', 'D', 'X', 'B','N', 'J', 'Z', 'S', 'Q', 'V', 'H', 'L', 'C', 'K', 'E'];
        
            console.log(value.length)
            if(value.length===9){

                let numeros=parseInt(value.substring(0,8));
                let letra = value.charAt(8);
                let resultado=numeros%23;

                if(letra==valores[resultado]){
                    //alert("DNI CORRECTO")
                    return true;
                }

                return false;

            } 
            
            
        }
        

        let dni=prompt("introduce el DNI");

        if (validarDNI(dni)) {
            alert("CORRECTO")
        } else {
            alert("INCORRECTO")
        }
