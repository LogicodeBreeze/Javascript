<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine-AJAX </title>
    <style>
        /* CSS: Estilo moderno y responsivo */
        :root {
            --primary: #e50914;
            --dark: #141414;
            --light: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 4px;
            border: none;
            font-size: 16px;
        }

        button {
            padding: 12px 24px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #b20710;
        }

        /* Grid de resultados */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .movie-card {
            background-color: #2f2f2f;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 15px;
        }

        .movie-info h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: var(--primary);
        }

        .movie-info p {
            font-size: 13px;
            color: #ccc;
            height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .rating {
            font-weight: bold;
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Cine-AJAX </h1>
        <p>Busca tus series y películas favoritas sin recargar la página</p>
    </div>

    <div class="search-box">
        <input type="text" id="query" placeholder="Ej: Batman, Breaking Bad...">
        <button id="searchBtn">Buscar</button>
    </div>

    <div id="results">
        </div>

    <script>
        // JAVASCRIPT: Lógica AJAX con Fetch
        const searchBtn = document.getElementById('searchBtn');
        const resultsDiv = document.getElementById('results');
        const queryInput = document.getElementById('query');

        async function searchMovies() {
            const searchTerm = queryInput.value;
            if (!searchTerm) return;

            // Limpiamos resultados previos y mostramos carga
            resultsDiv.innerHTML = '<p>Buscando...</p>';

            try {
                // Petición AJAX a TVMaze
                const response = await fetch(`https://api.tvmaze.com/search/shows?q=${searchTerm}`);
                const data = await response.json();

                // Limpiar el contenedor para los nuevos datos
                resultsDiv.innerHTML = '';

                if (data.length === 0) {
                    resultsDiv.innerHTML = '<p>No se encontraron resultados.</p>';
                    return;
                }

                // Iterar sobre los resultados y crear el HTML dinámicamente
                data.forEach(item => {
                    const show = item.show;
                    const card = document.createElement('div');
                    card.className = 'movie-card';

                    // Validar si hay imagen, si no poner una de relleno
                    const image = show.image ? show.image.medium : 'https://via.placeholder.com/210x295?text=Sin+Imagen';
                    
                    card.innerHTML = `
                        <img src="${image}" alt="${show.name}">
                        <div class="movie-info">
                            <h3>${show.name}</h3>
                            <span class="rating">⭐ ${show.rating.average || 'N/A'}</span>
                            <p>${show.summary ? show.summary.replace(/<[^>]*>/g, '') : 'Sin descripción disponible.'}</p>
                            <a href="${show.url}" target="_blank" style="color: #00adff; text-decoration: none; font-size: 12px;">Más info</a>
                        </div>
                    `;
                    resultsDiv.appendChild(card);
                });

            } catch (error) {
                console.error("Error en la petición:", error);
                resultsDiv.innerHTML = '<p>Hubo un error al obtener los datos.</p>';
            }
        }

        // Eventos
        searchBtn.addEventListener('click', searchMovies);

        // Permitir buscar al presionar "Enter"
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchMovies();
        });
    </script>
</body>
</html>
